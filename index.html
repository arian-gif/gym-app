<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gym" />
  <title>Gym Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1 id="title">Gym Tracker</h1>
    <div class="sync" id="syncStatus" title="Sync status">…</div>
  </header>

  <main id="view"></main>

  <nav class="tabbar">
    <button class="tab active" data-tab="train">🏋️ Train</button>
    <button class="tab" data-tab="history">📅 History</button>
    <button class="tab" data-tab="progress">📈 Progress</button>
    <button class="tab" data-tab="food">🍎 Food</button>
    <button class="tab" data-tab="settings">⚙️ Settings</button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
  <script src="workouts.js"></script>
  <script src="app.js"></script>
</body>
</html>
